<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Telemetry Dashboard - AI Voice Assistant V3</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            transition: background 0.3s ease;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 { color: #00e676; font-size: 2.5rem; margin-bottom: 5px; }
        #status-alert {
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            color: #00e676;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2c2c2c;
        }
        .graph-card {
            grid-column: span 2;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #2c2c2c;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .graph-card { grid-column: span 1; }
        }
        .card h3, .graph-card h3 { margin: 0 0 10px 0; color: #888; font-size: 0.9rem; text-transform: uppercase; }
        .value { font-size: 2.2rem; font-weight: bold; color: #ffffff; }
        .unit { font-size: 1rem; color: #888; }
        button {
            background: linear-gradient(45deg, #00e676, #00b0ff);
            color: black;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }

        /* 🤖 AI Voice Waveform Animation Styles */
        .ai-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            display: none; /* ஆரம்பத்தில் மறையும் */
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
        }
        .bar {
            width: 4px;
            height: 10px;
            background-color: #00e676;
            border-radius: 2px;
        }
        /* அனிமேஷன் ரன் ஆகும் போது மட்டும் இந்த கிளாஸ் ஆட் ஆகும் */
        .speaking .bar {
            animation: bounce 0.8s infinite ease-in-out alternate;
        }
        .speaking .bar:nth-child(2) { animation-delay: 0.1s; background-color: #00b0ff; }
        .speaking .bar:nth-child(3) { animation-delay: 0.2s; }
        .speaking .bar:nth-child(4) { animation-delay: 0.3s; background-color: #00b0ff; }
        .speaking .bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes bounce {
            100% { height: 40px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>ALPHA TELEMETRY V3</h1>
    <div id="status-alert">DISCONNECTED</div>
    
    <button id="connectBtn">CONNECT VEHICLE</button>

    <div class="grid">
        <div class="card">
            <h3>Engine Speed</h3>
            <div class="value" id="speedometer">0 <span class="unit">KM/H</span></div>
        </div>
        <div class="card">
            <h3>Battery Temp</h3>
            <div class="value" id="battery-temp">0 <span class="unit">°C</span></div>
        </div>
        <div class="card">
            <h3>Vibration Level</h3>
            <div class="value" id="vibration">0 <span class="unit">Hz</span></div>
        </div>
    </div>

    <div class="ai-box" id="aiBox">
        <div class="wave-container" id="waveContainer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div id="aiText" style="font-weight: bold; color: #00b0ff;">AI ASSISTANT SPEAKING...</div>
    </div>

    <div class="graph-card">
        <h3>Engine Vibration Spectrum (Live)</h3>
        <canvas id="vibrationChart" height="120"></canvas>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
